name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      # Use `npm install` (not `npm ci`) so the workflow tolerates
      # platform-specific optional deps (e.g. @emnapi on Linux) that may
      # not be recorded in package-lock.json when the lockfile is generated
      # on Windows. Trade-off: slightly slower than `npm ci`, but works
      # reliably cross-platform for a small team.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test
